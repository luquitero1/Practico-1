<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="../front/js/main.js" defer></script>
    <link rel="stylesheet" href="../front/dist/css/style.css">
    <title>Practico1</title>
</head>
<body class="m-0 p-0"> 
    <header class="d-flex flex-column flex-lg-row justify-content-between align-items-center px-4 py-3 py-lg-0 gap-3 gap-lg-0">
    <div class="logo d-flex align-items-center gap-2">
        <img class="logo-img img-fluid" src="../front/dist/assets/logo.png" alt="Logo">
        <h1 class="m-0"> E-Book </h1>
    </div>

    <nav class="header-links d-flex flex-wrap justify-content-center gap-3 gap-md-4 fs-5">
        <a href="../front/index.html" class="text-decoration-none text-dark">Home</a>
        <a href="../front/index.html" class="text-decoration-none text-dark">Shop</a>
        <a href="../front/index.html" class="text-decoration-none text-dark">Info</a>
        <a href="../front/index.html" class="text-decoration-none text-dark">Menu</a>
    </nav>

    <div class="d-flex align-items-center gap-2">
        <!-- Ícono lupa solo en mobile -->
        <button class="btn btn-outline-success d-md-none">🔍</button>

        <!-- Buscador completo en md+ -->
        <nav class="navbar bg-body-tertiary p-0 d-none d-md-block">
            <div class="container-fluid p-0">
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </nav>
    </div>
</header>

    <main>
        <section>
            <div id="hero" class="d-flex flex-column align-items-center w-100">
                <h1 class="mt-4 text-center px-3"> A good book at the best moment</h1>
                <h2 class="text-danger fs-1 m-0"> for you</h2>
                <div class="hero-image d-flex justify-content-center align-items-center">
                    <button class="btn rounded-pill text-white px-4 px-md-5 py-2 py-md-3 fs-5 fs-md-3">See more</button>
                </div>
            </div>
        </section>

        <section>
            <div class="recommended d-flex flex-column align-items-center w-100 mt-4 fs-5">
                <h1>Don´t know what to read today?</h1>
                <div class="d-flex w-75 m-0" id="information">
                </div>
            </div>
        </section>
        
        <section>
            <div class="d-flex justify-content-center px-3">
                <h1 class="text-center">Choose whatever you want from the list!</h1>
            </div>

            <div class="position-relative w-100 h-auto px-3 px-md-5">
                <button id="btnPrev" class="btn btn-dark position-absolute top-50 start-0 translate-middle-y z-1">&#10094;</button>

                <div id="scrollContainer" class="d-flex gap-4 py-5" style="
                    overflow-x: hidden;
                    padding-left: 50%;
                    padding-right: 50%;">
                </div>

                <button id="btnNext" class="btn btn-dark position-absolute top-50 end-0 translate-middle-y z-1">&#10095;</button>
            </div>
        </section>

        <section class="container my-5 py-5 border-top">
            <div class="d-flex justify-content-center mb-5">
                <h1 class="display-6 fw-bold text-center">Or explore our entire collection</h1>
            </div>
            <div id="gridContainer" class="row g-4 px-2 px-md-4">
            </div>
            <div class="d-flex justify-content-center align-items-center w-100 m-1 mt-4">
                <button class="btn rounded-pill text-white px-4 px-md-5 py-2 py-md-3 fs-5 fs-md-3" style="background-color: #FFAA33; font-family: 'Georgia', serif;">See more</button>
            </div>
        </section>
    </main>

    <footer class="py-5" style="background-color: #a76500;">
        <div class="container">
            <div class="row g-4">
                <div class="col-12 col-md-3 text-center text-md-end pe-md-4 align-self-center">
                    <img src="../front/dist/assets/logo.png" alt="Book" style="width: 85px; height: auto;">
                </div>
                <div class="col-6 col-md-2 text-center text-md-start align-self-start">
                    <ul class="list-unstyled mb-0 fs-5" style="font-family: 'Georgia', serif;">
                        <li class="mb-2"><a href="#" class="text-dark text-decoration-none footer-link">Home</a></li>
                        <li class="mb-2"><a href="#" class="text-dark text-decoration-none footer-link">Shop</a></li>
                        <li class="mb-2"><a href="#" class="text-dark text-decoration-none footer-link">Info</a></li>
                        <li class="mb-0"><a href="#" class="text-dark text-decoration-none footer-link">Menu</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md-2 text-center text-md-start align-self-start">
                    <ul class="list-unstyled mb-0 fs-5" style="font-family: 'Georgia', serif;">
                        <li class="mb-2"><a href="#" class="text-dark text-decoration-none footer-link">Contact</a></li>
                        <li class="mb-0"><a href="#" class="text-dark text-decoration-none footer-link">About us</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
